<!doctype html>
<html class="h-full min-w-0 w-full" lang="en" dir="ltr">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="/media/app/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <meta name="description" content="" />
    <meta
      name="keywords"
      content="keenthemes,react,material,kit,application,dashboard,admin,template"
    />
    <meta name="author" content="Metronic - Tailwind React Template" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css?family=Inter:300,400,500,600,700"
    />
    <style>
      .dark body {
        background-color: #182428;
      }
    </style>
    <script>
      (function () {
        try {
          const theme =
            localStorage.getItem('vite-theme') ||
            localStorage.getItem('theme') ||
            'light';
          const isDarkMode = theme === 'dark';
          if (isDarkMode) document.documentElement.classList.add('dark');
          else document.documentElement.classList.remove('dark');
        } catch (e) {}
      })();
    </script>
  </head>
  <body class="text-foreground bg-background flex h-full min-w-0 w-full text-base antialiased">
    <div class="flex min-w-0 w-full grow" id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
